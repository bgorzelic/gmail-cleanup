# KEEP list — senders the unsubscribe command refuses to touch.
#
# Substring-matched against the lowercased sender email. False positives are
# intentional — better to miss an unsub than to silently kill a bank alert or
# a fraud notification. If something here is too aggressive for your use case,
# remove the entry and re-run.

# Explicit KEEP entries (verified important automation)
